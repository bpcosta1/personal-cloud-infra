services:
  wg-easy:
    environment:
      - WG_HOST=${VPS_IP}
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    volumes:
      - ./wg-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wgeasy.rule=Host(`wireguard.${DOMAIN}`)"
      - "traefik.http.routers.wgeasy.entrypoints=websecure"
      - "traefik.http.routers.wgeasy.tls.certresolver=myresolver"
      - "traefik.http.services.wgeasy.loadbalancer.server.port=51821"

networks:
  proxy-network:
    external: true
